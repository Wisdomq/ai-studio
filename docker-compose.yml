services:
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-8080}:80'
      - '${VITE_PORT:-5173}:${VITE_PORT:-5174}'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
      - './docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf'
    networks:
      - sail
    depends_on:
      - mysql
      - redis

  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
      retries: 3
      timeout: 5s

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6380}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

  # ── ComfyUI MCP Sidecar ────────────────────────────────────────────────────
  # Lightweight Python MCP server (joenorton/comfyui-mcp-server).
  # Provides: workflow auto-discovery (list_workflows), job submission via MCP
  # protocol (run_workflow), and asset provenance (asset_id).
  #
  # Feature-flagged: COMFYUI_MCP_ENABLED controls whether Laravel routes
  # job submissions through this service or directly to ComfyUI.
  # The service always starts so workflow:sync can run regardless of the flag.
  #
  # Workflow JSON files: drop into ./comfyui-mcp-server/workflows/ on the host.
  # The bind mount makes them immediately available without rebuilding.
  comfyui-mcp:
    build:
      context: ./comfyui-mcp-server
      dockerfile: Dockerfile
    environment:
      COMFYUI_URL: 'http://172.16.10.13:8188'
      MCP_HOST: '0.0.0.0'
      FASTMCP_HOST: '0.0.0.0'
      HOST: '0.0.0.0'
    ports:
      - '${COMFYUI_MCP_PORT:-9000}:9000'
    volumes:
      # Bind-mount the workflows directory so JSON files can be added without rebuild
      - './comfyui-mcp-server/workflows:/app/workflows'
    networks:
      - sail
    restart: unless-stopped
    # No depends_on — MCP server connects to ComfyUI on 172.16.10.11 (external host)
    # and can start independently of the Laravel stack.

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local